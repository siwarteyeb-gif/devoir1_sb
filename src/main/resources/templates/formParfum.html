<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Parfums</title>
    <link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
</head>
<body>
<div class="container mt-5">

    <div class="card">
        <div class="card-header" th:if="${mode=='new'}">Ajout d'un Parfum</div>
        <div class="card-header" th:if="${mode=='edit'}">Modification d'un Parfum</div>

        <div class="card-body">
            <form th:action="@{saveParfum}" method="post" th:object="${parfum}">

                <input type="hidden" name="page" th:value="${page}" />
                <input type="hidden" name="size" th:value="${size}" />

                <!-- ID Parfum (caché) -->
                <input type="hidden" name="id" th:value="${parfum.id}" />

                <!-- Nom -->
                <div class="form-group">
                    <label>Nom du Parfum :</label>
                    <input type="text" name="nom" class="form-control" th:value="${parfum.nom}" />
                    <span th:errors="*{nom}" class="text-danger"></span>
                </div>

                <!-- Marque -->
                <div class="form-group">
                    <label>Marque :</label>
                    <input type="text" name="marque" class="form-control" th:value="${parfum.marque}" />
                    <span th:errors="*{marque}" class="text-danger"></span>
                </div>

                <!-- Prix -->
                <div class="form-group">
                    <label>Prix :</label>
                    <input type="number" name="prix" class="form-control" th:value="${parfum.prix}" />
                    <span th:errors="*{prix}" class="text-danger"></span>
                </div>

                <!-- Date de création -->
                <div class="form-group">
                    <label>Date de création :</label>
                    <input type="date" name="dateCreation" class="form-control" th:value="${parfum.dateCreation}" />
                    <span th:errors="*{dateCreation}" class="text-danger"></span>
                </div>

                <!-- Catégorie -->
                <div class="form-group">
                    <label>Catégorie :</label>
                    <select name="categorie.idCat" class="form-control" th:field="*{categorie.idCat}">
                        <option th:each="c : ${categories}" th:value="${c.idCat}" th:text="${c.nomCat}"
                                th:selected="${parfum.categorie != null} ? ${c.idCat} == ${parfum.categorie.idCat} : false">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">Valider</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
