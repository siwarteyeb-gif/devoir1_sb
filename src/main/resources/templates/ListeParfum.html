<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <title>Liste des Parfums</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <style>
        /* Borders supplémentaires pour mieux voir le tableau */
        table, th, td {
            border: 1px solid #343a40 !important;
            border-collapse: collapse;
        }
        th, td {
            text-align: center;
            vertical-align: middle;
        }
        .btn {
            margin-right: 5px;
        }
    </style>
</head>
<body>
<div th:replace="template"></div>

<!-- On injecte uniquement le fragment 'content' du template -->
    <div class="card shadow-sm mt-5">
        <div class="card-header bg-primary text-white">
            <h4>Liste des Parfums</h4>
        </div>
        <div class="card-body">

            <!-- Tableau des parfums -->
            <table class="table table-striped table-bordered">
                <thead class="thead-dark">
                <tr>
                    <th>ID</th>
                    <th>Marque</th>
                    <th>Nom</th>
                    <th>Prix</th>
                    <th>Contenance</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${parfums}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.marqueParfum}"></td>
                    <td th:text="${p.nomParfum}"></td>
                    <td th:text="${p.prixParfum}"></td>
                    <td th:text="${p.contenanceParfum}"></td>
                    <td th:text="${p.email}"></td>
                    <td>
                        <a th:href="@{/parfums/modifierParfum(id=${p.id}, page=${currentPage}, size=${size})}"
                           class="btn btn-sm btn-primary">Modifier</a>
                        <a th:href="@{/parfums/supprimerParfum(id=${p.id}, page=${currentPage}, size=${size})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce parfum ?');">
                            Supprimer
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- Bouton Ajouter -->
            <div class="mb-3">
                <a th:href="@{/parfums/showCreate}" class="btn btn-success">Ajouter un Parfum</a>
            </div>

            <!-- Pagination -->
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:each="i : ${pages}" th:classappend="${i==currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/parfums/Liste(page=${i}, size=${size})}" th:text="${i+1}">1</a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>
</div>
</body>
</html>
